<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AES-256-CBC URL-Safe Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
        .card { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; margin-top: 0; color: #0f172a; }
        .field { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-family: monospace; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .output-box { background: #f1f5f9; padding: 20px; border-radius: 10px; margin-top: 25px; }
        .result-area { background: white; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; min-height: 40px; word-break: break-all; margin-bottom: 10px; font-family: monospace; font-size: 0.9rem; }
        .btn-main { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 1rem; }
        .btn-copy { background: #22c55e; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .toast { color: #22c55e; font-size: 0.8rem; font-weight: bold; display: none; margin-left: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Công cụ tạo Payload AES-256-CBC</h2>
    <p style="font-size: 0.85rem; color: #64748b; text-align: center; margin-bottom: 20px;">
        Mã hóa chuẩn AES-256-CBC với PKCS7 padding, Base64 URL-safe.
    </p>

    <div class="field">
        <label>Chuỗi truy vấn Plaintext:</label>
        <textarea id="dataInput" rows="3" placeholder="uid=688665...&server_id=3311..."></textarea>
    </div>

    <div class="grid">
        <div class="field">
            <label>Khóa bí mật (32 ký tự):</label>
            <input type="text" id="key" value="" placeholder="Nhập Secret Key...">
        </div>
        <div class="field">
            <label>Vector khởi tạo (16 ký tự - IV):</label>
            <input type="text" id="iv" value="" placeholder="Nhập IV...">
        </div>
    </div>

    <div class="field">
        <label>Base URL:</label>
        <input type="text" id="baseUrl" value="https://game.oeg.vn/payment/vung-dat-anh-hung">
    </div>

    <button class="btn-main" onclick="process()">Tạo Payload Mã hóa</button>

    <div class="output-box">
        <label>Payload mã hóa Base64 URL-safe:</label>
        <div id="payloadOut" class="result-area"></div>
        <button class="btn-copy" onclick="copy('payloadOut', 't1')">Sao chép Payload</button>
        <span id="t1" class="toast">✓ Đã chép!</span>

        <label style="margin-top:20px; display:block;">URL Hoàn chỉnh:</label>
        <div id="urlOut" class="result-area"></div>
        <button class="btn-copy" onclick="copy('urlOut', 't2')">Sao chép Full URL</button>
        <span id="t2" class="toast">✓ Đã chép!</span>
    </div>
</div>

<script>
    function toUrlSafe(base64) {
        return base64
            .replace(/\+/g, '-') // Thay + bằng -
            .replace(/\//g, '_') // Thay / bằng _
            .replace(/=+$/, '');  // Loại bỏ dấu = ở cuối
    }

    function process() {
        const data = document.getElementById('dataInput').value;
        const keyStr = document.getElementById('key').value;
        const ivStr = document.getElementById('iv').value;
        const baseUrl = document.getElementById('baseUrl').value.trim();

        if (!keyStr || !ivStr) {
            alert("Vui lòng điền đầy đủ Key và IV!");
            return;
        }

        try {
            const key = CryptoJS.enc.Utf8.parse(keyStr);
            const iv = CryptoJS.enc.Utf8.parse(ivStr);

            const encrypted = CryptoJS.AES.encrypt(data, key, {
                iv: iv,
                mode: CryptoJS.mode.CBC,
                padding: CryptoJS.pad.Pkcs7
            });

            // Lấy Base64 gốc
            const rawBase64 = encrypted.toString();
            
            // Chuyển sang URL-safe để không bị ký tự % trong URL
            const urlSafePayload = toUrlSafe(rawBase64);
            
            document.getElementById('payloadOut').innerText = urlSafePayload;

            // Ghép URL (không dùng encodeURIComponent nữa vì payload đã safe)
            const sep = baseUrl.includes('?') ? '&' : '?';
            document.getElementById('urlOut').innerText = `${baseUrl}${sep}payload=${urlSafePayload}`;

        } catch (e) {
            alert("Lỗi xử lý: " + e.message);
        }
    }

    function copy(id, toastId) {
        const text = document.getElementById(id).innerText;
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
            const t = document.getElementById(toastId);
            t.style.display = 'inline';
            setTimeout(() => t.style.display = 'none', 2000);
        });
    }
</script>

</body>
</html>
